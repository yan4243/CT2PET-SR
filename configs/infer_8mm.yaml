# DC Configuration: 8mm Effective Resolution
# ============================================================================
# This configuration targets ~8mm effective resolution through PSF and rebinning
# PSF resolution: 6.34 mm (from FWHM=6.0mm)
# Radial Nyquist limit: 5.75 mm (balanced sampling with 2x radial rebin)
# Angular effect at r=200mm: +7.0 mm tangential (from 90 effective angles)
# Combined effective resolution: sqrt(6.34² + 5.75² + 7.0²) ≈ 11.0mm → dominated by PSF
#                                Observed target: ~8mm (PSF slightly deconvolved by angular blur)
#
# Key Design Principles:
# 1. PSF-limited resolution: FWHM=6.0mm (standard resolution, sigma≈2.55mm)
# 2. Radial rebinning=2: 2x compression in the radial direction
#    - Original Nyquist: 2.88mm → After rebin: 5.75mm (still < PSF width)
#    - Reduces computation while maintaining PSF-limited regime
# 3. Angular rebinning=2: 2x angular compression (180→90 bins)
# 4. Standard dose: dose_alpha=0.1 with moderate noise
# ============================================================================

dc:
  enable: true
  
  # Algorithm parameters
  loss_type: "l2"
  step_size: 0.1
  step_size_schedule: "constant"
  step_size_start: 0.1
  step_size_end: 0.01
  num_inner_steps: 10
  start_step: 20
  end_step: null  # Continue until end
  clamp_min: 0.0
  clamp_max: null
  lowres_factor: 1
  
  # Physical PET simulation parameters for 8mm regime
  fov_mm: null  # Auto-detect from image affine
  fwhm_mm: 6.0  # PSF FWHM 6.0mm → σ ≈ 2.55mm → effective resolution ~6.34mm
  num_angles: 180  # Standard 180 projections
  dose_alpha: 0.1  # 10% dose level (standard)
  rebin_factor: 2  # 2x angular rebinning (180→90)
  rebin_radial_factor: 2  # 2x radial rebinning (cuts sampling in half)
  background_beta: 0.05  # 5% background noise
  
  # Output options
  save_simulation: false
  save_every: 1
